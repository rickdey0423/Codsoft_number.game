<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Number Guessing Game!</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body>

    <div class="container animate__animated animate__fadeInDown">
        <h2 id="title">🌟 Guess the Magic Number! 🌟</h2>
        <p>Pick a number between 1 and 100</p>
        
        <div class="input-area">
            <input type="number" id="userGuess" placeholder="?" autocomplete="off">
            <button id="submitBtn" onclick="checkGuess()">Guess!</button>
        </div>
        
        <div id="visual-hint" class="animate__animated"></div>
        <p id="message"></p>
        
        <button id="resetBtn" class="hidden animate__animated animate__bounceIn" onclick="resetGame()">Play Again! 🎈</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
